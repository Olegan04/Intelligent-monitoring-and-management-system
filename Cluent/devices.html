<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный учёт ресурсов — Устройства</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📊 Умный учёт</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="dashboard.html">Дашборд</a></li>
                <li><a href="devices.html">Устройства</a></li>
            </ul>
        </div>
    </nav>

    <main class="container page-content">
        <h1>📟 Управление устройствами</h1>
        
        <div class="stat-card" style="margin-bottom: 2rem;">
            <h3>➕ Добавить новый счётчик</h3>
            <form id="addDeviceForm">
                <div class="form-group">
                    <label for="deviceType">Тип счётчика</label>
                    <select id="deviceType">
                        <option value="electricity">Электричество</option>
                        <option value="hot_water">Горячая вода</option>
                        <option value="cold_water">Холодная вода</option>
                        <option value="gas">Тепло</option>
                        <option value="gas">Газ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="addressId">Адрес установки</label>
                    <select id="addressId">
                        <option value="1">г. Томск, ул. Вершинина, д. 39а, кв. 433</option>
                        <option value="2">г. Новокузнецк, пр. Сов. Армии, д. 19, кв. 18</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="deviceName">Название (опционально)</label>
                    <input type="text" id="deviceName" placeholder="Например: Кухня, Квартира">
                </div>
                <button type="submit" class="btn">➕ Добавить</button>
            </form>
        </div>

        <div class="stat-card">
            <h3>📋 Мои устройства</h3>
            <div id="devicesList" class="devices-list">
                <!-- Данные будут подставлены из JS -->
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
